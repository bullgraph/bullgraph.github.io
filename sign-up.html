  <link rel="stylesheet" href="css/bootstrap.css">
  <link rel="stylesheet" href="fonts/fontawesome-5/css/all.css">

<body data-theme="light">
  <div class="site-wrapper position-relative overflow-hidden ">
    <!-- Sign Up area -->
    <div class="bg-white-ash min-height-100vh">
      <div class="container-fluid no-gutters h-100 pl-lg-0">
        <div class="row no-gutters align-items-center justify-content-lg-start justify-content-center  h-100">
          <!-- Right Image -->
          <div class="col-lg-6 col-md-10 pr-xl-22 pr-lg-0 d-none d-lg-block">
            <div class="fixed-left-bg">
              <div class="bg-image min-height-100vh" style="background: url(image/sign-in/sign-up.png);"></div>
            </div>
          </div>
          <div class="col-lg-6 col-md-7 col-sm-8 col-xs-11 pl-lg-8 pl-xl-0">
            <div class="pl-xl-12 pr-xl-0 pr-lg-0  my-lg-15 my-12">
              <div class="max-w-450 ">
                <div class="mb-lg-17 mb-md-12 mb-9">
                  <h2 class="font-size-11 heading-letter-spacing-4 text-black mb-7">Sign Up to Metsys</h2>
                  <p class="font-size-6 text-boulder letter-spacing-normal">With lots of unique blocks, you can easily build a page without coding within few minutes.</p>
                </div>
                <!-- Sign Up Form -->
                <form action="#" class="pr-lg-5">
                  <div class="form-group mb-9">
                    <label class="font-size-2 letter-spacing-0p5 text-cod-gray text-uppercase font-weight-bold mb-0 font-family-2">Full name</label>
                    <input type="text" name="f-name" class="form-control form-control-s-in-up bg-white boulder text-placeholder-cod-gray font-size-5 rounded-0 border-top-0 border-left-0 border-right-0 pl-0" placeholder="Your Full Name" id="f-name">
                  </div>
                  <div class="form-group mb-9">
                    <label class="font-size-2 letter-spacing-0p5 text-cod-gray text-uppercase font-weight-bold mb-0 font-family-2">Email
                      Address</label>
                    <input type="email" name="email" class="form-control form-control-s-in-up bg-white boulder text-placeholder-cod-gray font-size-5 rounded-0 border-top-0 border-left-0 border-right-0 pl-0" placeholder="Your Email Address" id="email">
                  </div>
                  <div class="form-group mb-9">
                    <label class="font-size-2 letter-spacing-0p5 text-cod-gray text-uppercase font-weight-bold mb-0 font-family-2">Password</label>
                    <input type="email" name="email" class="form-control form-control-s-in-up bg-white boulder text-placeholder-cod-gray font-size-5 rounded-0 border-top-0 border-left-0 border-right-0 pl-0" placeholder="Your Password" id="password">
                  </div>
                  <div class="form-group mb-9">
                    <label class="font-size-2 letter-spacing-0p5 text-cod-gray text-uppercase font-weight-bold mb-0 font-family-2">Confirm Password</label>
                    <input type="text" name="conf-pass" class="form-control form-control-s-in-up bg-white boulder text-placeholder-cod-gray font-size-5 rounded-0 border-top-0 border-left-0 border-right-0 pl-0" placeholder="Retype Your Password" id="conf-pass">
                  </div>
                  <div class="check-form d-inline-block mt-13">
                    <label for="terms-check" class="check-input-control d-flex align-items-md-center mb-0">
                      <input class="d-none" type="checkbox" id="terms-check">
                      <span class="checkbox rounded-check-box mr-5"></span>
                      <span class="font-size-3 text-boulder mt-n1">I agree to all the statements included in <a href="sign-up.html"
                    class="text-primary text-decoration-underline"><u>privacy policy</u></a></span>
                    </label>
                  </div>
                  <div class="sign-in-btn mt-8">
                    <a href="sign-up.html" class="btn bg-red-orange sign-in-btn text-white font-family-2">Sign Up</a>
                    <p class="font-size-5 mt-6 text-boulder">Already a member? <a href="sign-in.html" class="text-primary text-decoration-underline"><u>Sign In</u></a>
                    </p>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- Vendor Scripts -->
  <script src="js/vendor.min.js"></script>

  <script src="plugins/fancybox/jquery.fancybox.min.js"></script>

  <script src="plugins/counter-up/waypoint.js"></script>
  <script src="plugins/counter-up/jquery.counterup.min.js"></script>
  <!-- Activation Script -->
  <script src="js/custom.js"></script>
