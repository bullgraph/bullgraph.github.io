<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Acessar minha conta - Bullgraph. </title>
  <link rel="shortcut icon" href="image/favicon/favicon.png" type="image/x-icon">
  <link rel="stylesheet" href="css/bootstrap.css">
  <link rel="stylesheet" href="fonts/fontawesome-5/css/all.css">
  <link rel="stylesheet" href="plugins/aos/aos.min.css">
  <link rel="stylesheet" href="plugins/fancybox/jquery.fancybox.min.css">
  <link rel="stylesheet" href="plugins/slick/slick.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body data-theme="light">
  <div class="site-wrapper position-relative overflow-hidden ">
    <div class="bg-white-ash min-height-100vh">
      <div class="container-fluid no-gutters min-height-100vh pl-lg-0">
        <div class="row no-gutters align-items-lg-center justify-content-lg-start justify-content-center  min-height-100vh">
          <div class="col-lg-6 col-md-10 pr-xl-22 pr-lg-0 d-none d-lg-block">
            <div class="fixed-left-bg">
              <div class="bg-image min-height-100vh"></div>
            </div>
          </div>
          <div class="col-lg-6 col-md-8 col-sm-8 col-xs-11 pl-lg-8 pl-xl-0">
            <div class="pl-xl-12 pr-xl-0  my-lg-15 my-12">
              <div class="max-w-450 ">
                <div class="mb-lg-15 mb-md-12 mb-9">
                  <h2 class="font-size-11 heading-letter-spacing-4 text-black mb-7">Sign In to Metsys</h2>
                  <p class="font-size-6 text-boulder line-height-1p6 letter-spacing-normal">Entre com sua credencial para acessar.</p>
                </div>
                <!-- Sign In Form -->
                <form action="#" class="pr-lg-5">
                  <div class="form-group mb-9">
                    <label class="font-size-2 letter-spacing-0p5 text-cod-gray text-uppercase font-weight-bold mb-0 font-family-2">Email
                      Address</label>
                    <input type="email" name="email" class="form-control form-control-s-in-up bg-white boulder text-placeholder-cod-gray font-size-5 rounded-0 border-top-0 border-left-0 border-right-0 pl-0" placeholder="Email cadastrado" id="email">
                  </div>
                  <div class="form-group mb-9">
                    <label class="font-size-2 letter-spacing-0p5 text-cod-gray text-uppercase font-weight-bold mb-0 font-family-2">Password</label>
                    <input type="email" name="email" class="form-control form-control-s-in-up bg-white boulder text-placeholder-cod-gray font-size-5 rounded-0 border-top-0 border-left-0 border-right-0 pl-0" placeholder="Senha" id="password">
                  </div>
                  <div class="check-form d-inline-block mt-13">
                    <label for="terms-check" class="check-input-control d-flex align-items-center mb-0">
                      <input class="d-none" type="checkbox" id="terms-check">
                      <span class="checkbox rounded-check-box mr-5"></span>
                      <span class="font-size-3 text-boulder">Lembrar</span>
                    </label>
                  </div>
                  <div class="sign-in-btn mt-8">
                    <a href="sign-in.html" class="btn bg-red-orange sign-in-btn text-white font-family-2">Entrar</a>
                    <p class="font-size-5 mt-6 text-boulder">Ainda não tem uma conta? <a href="#" class="text-primary text-decoration-underline"><u>Abra sua conta</u></a>
                    </p>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/vendor.min.js"></script>
  <script src="plugins/fancybox/jquery.fancybox.min.js"></script>
  <script src="plugins/aos/aos.min.js"></script>
  <script src="plugins/slick/slick.min.js"></script>
  <script src="plugins/counter-up/waypoint.js"></script>
  <script src="plugins/counter-up/jquery.counterup.min.js"></script>
  <script src="js/custom.js"></script>
</body>
</html>
